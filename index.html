<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STR Community</title>
<style>
/* -------------------- الإعدادات الأساسية -------------------- */
body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #0a0a0a;
    color: #fff;
}
section {
    padding: 60px 20px;
    min-height: 100vh;
}
.container {
    max-width: 1200px;
    margin: auto;
}

/* -------------------- العناوين -------------------- */
h1 {
    font-size: 50px;
    text-align: center;
    color: #FFD700;
    text-shadow: 0 0 10px #FFD700;
    margin-bottom: 10px;
}
h2 {
    font-size: 28px;
    margin-bottom: 15px;
    color: #FFD700;
}

/* -------------------- الصناديق -------------------- */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
}
.box {
    background: #1a1a1a;
    border: 2px solid #FFD700;
    border-radius: 15px;
    padding: 20px;
    text-align: center;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}
.box:hover {
    transform: translateY(-5px);
    box-shadow: 0 0 15px #FFD700;
}

/* -------------------- الروابط -------------------- */
a {
    display: block;
    text-decoration: none;
    color: #FFD700;
    font-weight: bold;
    margin: 10px 0;
    transition: all 0.3s ease;
}
a:hover {
    color: #fff;
    background: #FFD700;
    padding: 5px 10px;
    border-radius: 8px;
}

/* -------------------- الصور -------------------- */
.admin-img {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    margin-top: 10px;
    border: 2px solid #FFD700;
    transition: transform 0.3s ease;
}
.admin-img:hover {
    transform: scale(1.2);
}

/* -------------------- زر التبديل -------------------- */
.toggle-btn {
    position: fixed;
    bottom: 20px;
    left: 20px;
    background: #FFD700;
    color: #000;
    padding: 10px 20px;
    border-radius: 50px;
    cursor: pointer;
    font-weight: bold;
    box-shadow: 0 0 10px #FFD700;
    transition: all 0.3s ease;
}
.toggle-btn:hover {
    transform: scale(1.1);
    box-shadow: 0 0 20px #FFD700;
}
</style>
</head>
<body>

<section>
<div class="container">
<h1>STR Community ✨</h1>

<h2>إدارة السيرفر 👑</h2>
<div class="grid">
<div class="box">
<a href="#">Owner Ship: SANJI</a>

</div>
<div class="box">

</div>

</div>
</div>
